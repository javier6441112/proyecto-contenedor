<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Puntos de Interés</title>

<style>
body { font-family: Arial; background:#0f172a; color:white; padding:20px; }
.card { background:#1e293b; padding:15px; margin:10px 0; border-radius:10px; }
input, select, button { padding:10px; margin:5px; border-radius:5px; border:none; }
button { background:#3b82f6; color:white; cursor:pointer; }
</style>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>
<body>

<h1>📍 Sistema de Puntos</h1>

<div class="card">
<h3>Agregar punto</h3>

<input id="nombre" placeholder="Nombre">
<input id="descripcion" placeholder="Descripción">

<select id="categoria">
    <option value="cultural">Cultural</option>
    <option value="gastronomico">Gastronómico</option>
    <option value="salud">Salud</option>
    <option value="servicio">Servicio</option>
</select>

<input id="lat" placeholder="Latitud">
<input id="lon" placeholder="Longitud">

<button onclick="guardar()">Guardar</button>
</div>

<div class="card">
<h3>Buscar cercanos</h3>
<input id="lat2" placeholder="Latitud">
<input id="lon2" placeholder="Longitud">
<input id="radio" placeholder="Radio (ej: 2000)">
<button onclick="cercanos()">Buscar</button>
</div>

<div id="resultados"></div>

<div class="card">
<h3>Ver puntos</h3>

<select id="categoriaFiltro">
    <option value="">Cargando...</option>
</select>

<button onclick="cargarTodo()">Buscar</button>
<button onclick="cargarSoloTodos()">Ver todos</button>

</div>

<div class="card">
    <h3>Mapa</h3>
    <div id="map" style="height:400px;"></div>
</div>

<script>
let mapMarkers = [];

function mostrar(data) {
    let div = document.getElementById("resultados");
    div.innerHTML = "";

    // limpiar marcadores
    mapMarkers.forEach(m => map.removeLayer(m));
    mapMarkers = [];

    data.forEach(p => {
        let card = document.createElement("div");
        card.className = "card";

        let nombre = p[0];
        let categoria = p[1];

        let lat, lon, distancia;

        if (p.length === 5) {
            // con distancia
            distancia = p[2];
            lat = p[3];
            lon = p[4];
        } else {
            // sin distancia
            lat = p[2];
            lon = p[3];
        }

        let contenido = `<b>${nombre}</b><br>Categoría: ${categoria}`;

        if (distancia) {
            contenido += `<br>Distancia: ${distancia.toFixed(2)} m`;
        }

        card.innerHTML = contenido;
        div.appendChild(card);

        // agregar marcador
        if (lat != null && lon != null) {
            let m = L.marker([lat, lon])
            .addTo(map)
            .bindPopup(`<b>${nombre}</b><br>${categoria}`)
            .bindTooltip(nombre, {permanent: true, direction: 'top'});
                }
            });
}

function guardar() {
    fetch("/api/puntos", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            nombre: document.getElementById("nombre").value,
            descripcion: document.getElementById("descripcion").value,
            categoria: document.getElementById("categoria").value,
            lat: parseFloat(document.getElementById("lat").value),
            lon: parseFloat(document.getElementById("lon").value)
        })
    })
    .then(res => res.json())
    .then(() => alert("Guardado correctamente"));
     cargarCategorias();
}

function cercanos() {
    let lat = document.getElementById("lat2").value;
    let lon = document.getElementById("lon2").value;
    let radio = document.getElementById("radio").value;

    fetch(`/api/puntos/cerca?lat=${lat}&lon=${lon}&radio=${radio}`)
        .then(res => res.json())
        .then(data => mostrar(data));
}

function cargarTodo() {
    let cat = document.getElementById("categoriaFiltro").value;

    let url = "/api/puntos";

    if (cat) {
        url += `?cat=${cat}`;
    }

    fetch(url)
        .then(res => res.json())
        .then(data => mostrar(data));
}

function cargarSoloTodos() {
    fetch("/api/puntos")
        .then(res => res.json())
        .then(data => mostrar(data));
}

function cargarCategorias() {
    fetch("/api/categorias")
        .then(res => res.json())
        .then(data => {

            let comboFiltro = document.getElementById("categoriaFiltro");
            let comboGuardar = document.getElementById("categoria");

            comboFiltro.innerHTML = '<option value="">-- Todas --</option>';
            comboGuardar.innerHTML = '';

            data.forEach(cat => {
                // filtro
                let opt1 = document.createElement("option");
                opt1.value = cat;
                opt1.textContent = cat;
                comboFiltro.appendChild(opt1);

                // guardar
                let opt2 = document.createElement("option");
                opt2.value = cat;
                opt2.textContent = cat;
                comboGuardar.appendChild(opt2);
            });
        });
}

let map;
let marcador;

function iniciarMapa() {
    map = L.map('map').setView([14.6349, -90.5069], 13); // Guatemala por defecto

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // Evento al hacer click en el mapa
    map.on('click', function(e) {
        let lat = e.latlng.lat;
        let lon = e.latlng.lng;

        // llenar inputs automáticamente
        document.getElementById("lat").value = lat;
        document.getElementById("lon").value = lon;

        // mover marcador
        if (marcador) {
            marcador.setLatLng(e.latlng);
        } else {
            marcador = L.marker(e.latlng).addTo(map);
        }
    });
}

window.onload = function() {
    iniciarMapa();
    cargarCategorias();
};


</script>

</body>
</html>
