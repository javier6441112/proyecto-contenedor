version: "3.8"

services:

  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_DB: poi_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - red

  backend:
    build: ./app
    depends_on:
      - db
    networks:
      - red

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
    networks:
      - red

volumes:
  db_data:

networks:
  red: